<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hieroglyphic Name Encryption</title>
    <style>
        /* Import Google Fonts for an ancient, archival look */
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=EB+Garamond:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --bg-stone: #12100e;
            /* Extremely dark sand/stone */
            --gold-light: #ffff;
            --gold-main: #fff;
            --gold-dim: #fff;
            --lapis: #fff;
            /* Lapis lazuli */
            --lapis-glow: rgba(255, 255, 255, 0.6);
            --curse-glow: rgba(255, 255, 255, 0.4);
            --font-main: 'Space Grotesk', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body,
        html {
            background-color: #000;
            /* Generated cinematic Egyptian tomb image */
            background-size: cover;
            background-position: center;
            background-blend-mode: normal;
            color: var(--gold-light);
            font-family: var(--font-main);
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            box-sizing: border-box;

            /* Apply a flickering torch lighting effect over the entire tomb environment */
        }

        /* Ambient vignette overlay to direct focus to the center and darken edges heavily */
        body::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 50% 50%, rgba(0, 0, 0, 0.6) 0%, rgba(0, 0, 0, 0.95) 100%);
            pointer-events: none;
            z-index: 1;
        }

        #terminal {
            width: 100%;
            height: 100%;
            padding: 3vw 5vw;
            box-sizing: border-box;
            display: block;
            position: relative;
            z-index: 10;
            background: rgba(0, 0, 0, 0.4);
            /* Ensures the exact text area is deeply dark */
        }

        #terminal.center-stage {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .line {
            font-size: clamp(16px, 4.8vmin, 5vw);
            /* Fluid scaling with min/max safety */
            line-height: 1.25;
            font-weight: 700;
            letter-spacing: -0.02em;
            word-wrap: break-word;
            margin-bottom: 0.5vw;
            text-transform: uppercase;
            color: #ffffff;
        }

        .dense .line {
            font-size: clamp(12px, 2.8vmin, 3vw);
        }

        .hieroglyph-line .line {
            font-size: clamp(14px, 3.5vmin, 4vw);
        }

        .input-line-wrapper {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            font-size: clamp(16px, 4.8vmin, 5vw);
            line-height: 1.25;
            font-weight: 700;
            letter-spacing: -0.02em;
            text-transform: uppercase;
        }

        .input-line-wrapper input,
        .input-line-wrapper span[contenteditable] {
            color: var(--gold-light);
            text-transform: uppercase;
        }

        .cursor {
            display: inline-block;
            width: 0.8vmin;
            height: clamp(14px, 4.3vmin, 4.5vw);
            background-color: var(--lapis);
            vertical-align: text-bottom;
            margin-left: 0.4vw;
            box-shadow: 0 0 15px var(--lapis);
            animation: blink 1s step-end infinite;
        }

        .dense .cursor,
        .hieroglyph-line .cursor {
            height: clamp(12px, 2.8vmin, 3vw);
        }

        /* Glowing curse effect for the final Hieroglyphs */
        .hieroglyph {
            font-family: sans-serif;
            color: #fff;
            text-shadow:
                0 0 10px var(--gold-main),
                0 0 25px var(--gold-main),
                0 0 50px #ff4500;
            /* Subtle fiery red curse undertone */
            animation: pulse-curse 2s infinite alternate ease-in-out;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-block;
        }

        /* Interaction glow */
        .hieroglyph:hover {
            color: #ffffff;
            text-shadow:
                0 0 20px #ffffff,
                0 0 40px var(--gold-light),
                0 0 70px #ff0000;
            transform: scale(1.3);
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
                box-shadow: none;
            }
        }

        @keyframes pulse-curse {
            0% {
                text-shadow: 0 0 15px #f00, 0 0 20px #8b0000;
                filter: brightness(0.8) sepia(0.5);
                transform: scale(0.98);
            }

            100% {
                text-shadow: 0 0 40px #ff4500, 0 0 70px #ff0000;
                filter: brightness(1.3) sepia(0);
                transform: scale(1.05);
            }
        }

        /* Game Over / Success Overlays */
        #game-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1.5s;
            flex-direction: column;
            text-align: center;
        }

        #game-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .victory-text {
            font-size: 8vmin;
            color: #fff;
            text-shadow: 0 0 30px #ffcf00;
            margin-bottom: 2vw;
            animation: victory-pulse 2s infinite alternate;
        }

        @keyframes victory-pulse {
            from {
                text-shadow: 0 0 20px #ffcf00;
                transform: scale(1);
            }

            to {
                text-shadow: 0 0 50px #fff;
                transform: scale(1.05);
            }
        }

        .hidden {
            display: none !important;
        }

        ::selection {
            background: var(--lapis);
            color: #fff;
        }

        /* Dynamic Background Letters */
        #bg-letters-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-letter {
            position: absolute;
            color: rgba(255, 240, 180, 0.15);
            font-family: var(--font-main);
            font-weight: 700;
            font-size: 10vmin;
            pointer-events: none;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5), 0 0 60px rgba(255, 165, 0, 0.3);
            animation: bg-letter-fade 4s forwards cubic-bezier(0.22, 1, 0.36, 1);
            user-select: none;
            z-index: 0;
        }

        @keyframes bg-letter-fade {
            0% {
                transform: translate(-50%, -50%) scale(0.3) rotate(0deg);
                opacity: 0;
                filter: blur(15px);
            }

            15% {
                opacity: 0.7;
                filter: blur(0px);
                transform: translate(-50%, -50%) scale(1.1) rotate(5deg);
            }

            100% {
                transform: translate(-50%, -50%) scale(2.5) translateY(-250px) rotate(-15deg);
                opacity: 0;
                filter: blur(30px);
            }
        }

        /* Responsive scaling */
        @media (max-width: 900px) {
            #terminal {
                padding: 5vh 8vw;
            }

            .line,
            .input-line-wrapper {
                font-size: 8.5vmin;
            }

            .dense .line {
                font-size: 6vmin;
            }

            .hieroglyph-line .line {
                font-size: 7.5vmin;
            }

            .cursor {
                width: 2vmin;
                height: 7.5vmin;
            }

            .dense .cursor,
            .hieroglyph-line .cursor {
                height: 5.5vmin;
            }

            .victory-text {
                font-size: 15vmin;
            }

            .victory-subtext {
                font-size: 7.5vmin !important;
            }

            .victory-prompt {
                font-size: 5vmin !important;
            }
        }

        /* Mobile Landscape specific adjustments */
        @media (max-width: 900px) and (orientation: landscape) {
            #terminal {
                padding: 3vh 5vw;
            }

            .line,
            .input-line-wrapper {
                font-size: 6vmin;
            }

            .dense .line {
                font-size: 4vmin;
            }

            .hieroglyph-line .line {
                font-size: 5vmin;
            }

            .cursor {
                height: 5.5vmin;
            }

            .victory-text {
                font-size: 12vmin;
            }
        }

        .victory-subtext {
            font-size: 2vmin;
        }

        .victory-prompt {
            font-size: 1.2vmin;
            margin-top: 2vw;
            opacity: 0.5;
        }

        .action-container {
            display: flex;
            gap: 20px;
            margin-top: 3vw;
        }

        .print-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: #fff;
            padding: 12px 24px;
            font-family: var(--font-main);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            z-index: 1001;
            font-size: 14px;
        }

        .print-btn:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        /* Enhanced Print layout with Ancient Papyrus aesthetic */
        #print-report {
            display: none;
            background-color: #d2b48c;
            color: #2c2419;
            z-index: 9999;
            font-family: 'EB Garamond', serif;
        }

        .report-page {
            position: relative;
            width: 210mm;
            height: 297mm;
            padding: 25mm;
            margin: 0 auto 20px auto;
            box-sizing: border-box;
            background-color: #f4e1c1;
            background-image:
                radial-gradient(circle at 10% 10%, rgba(139, 69, 19, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 90% 90%, rgba(139, 69, 19, 0.05) 0%, transparent 50%),
                url('https://www.transparenttextures.com/patterns/papyros.png');
            border: 20px solid transparent;
            border-image: url('https://www.transparenttextures.com/patterns/black-linen.png') 30 round;
            box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.1), 0 0 40px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Weathered border effect */
        .report-page::before {
            content: "";
            position: absolute;
            top: 5px;
            left: 5px;
            right: 5px;
            bottom: 5px;
            border: 2px solid #8b4513;
            opacity: 0.3;
            pointer-events: none;
        }

        .report-header {
            text-align: center;
            border-bottom: 2px solid #8b4513;
            padding-bottom: 20px;
            margin-bottom: 30px;
            position: relative;
        }

        .report-header::before,
        .report-header::after {
            content: "𓋹";
            color: #8b4513;
            font-size: 32px;
            position: absolute;
            bottom: -22px;
            background: #f4e1c1;
            padding: 0 15px;
        }

        .report-header::before {
            left: 15%;
        }

        .report-header::after {
            right: 15%;
        }

        .report-header h1 {
            margin: 0;
            font-size: 32px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #4a3728;
            font-family: 'Cinzel', serif;
            font-weight: 900;
        }

        .report-header p {
            margin: 8px 0;
            font-size: 16px;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.7;
            font-family: 'Cinzel', serif;
        }

        .summary-section {
            margin-bottom: 25px;
            line-height: 1.6;
            font-size: 18px;
            text-align: center;
            padding: 20px 40px;
            font-style: italic;
            border-top: 1px dashed rgba(139, 69, 19, 0.2);
            border-bottom: 1px dashed rgba(139, 69, 19, 0.2);
        }

        .report-table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
            font-size: 16px;
            table-layout: fixed;
        }

        .report-table th {
            background: rgba(139, 69, 19, 0.1);
            color: #4a3728;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 2px;
            padding: 12px;
            border: 1px solid #8b4513;
            font-family: 'Cinzel', serif;
        }

        .report-table td {
            border: 1px solid rgba(139, 69, 19, 0.3);
            padding: 10px;
            text-align: center;
            font-weight: 400;
            word-wrap: break-word;
        }

        .report-page.dense-data .report-table {
            font-size: 11px;
        }

        .report-page.dense-data .report-table td,
        .report-page.dense-data .report-table th {
            padding: 4px;
        }

        .report-table tr:nth-child(even) {
            background: rgba(139, 69, 19, 0.03);
        }

        .report-seal-box {
            text-align: center;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(139, 69, 19, 0.3);
            margin: 10px auto;
            width: 60%;
            position: relative;
        }

        .report-hieros {
            font-size: 60px;
            margin: 20px 0;
            display: block;
            color: #3b2a1a;
            filter: drop-shadow(2px 2px 2px rgba(0, 0, 0, 0.1));
        }

        .cartouche-container {
            text-align: center;
            margin: 25px 0;
        }

        .cartouche {
            display: inline-block;
            border: 3px solid #8b4513;
            border-radius: 40px;
            padding: 10px 40px;
            background: rgba(255, 255, 255, 0.3);
            position: relative;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.05);
            max-width: 85%;
            box-sizing: border-box;
        }

        .cartouche::before,
        .cartouche::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 20px;
            height: 2px;
            background: #8b4513;
        }

        .cartouche::before {
            left: -25px;
        }

        .cartouche::after {
            right: -25px;
        }

        .cartouche-name {
            font-size: 44px;
            font-weight: 400;
            color: #2c2419;
            word-wrap: break-word;
            overflow-wrap: break-word;
            white-space: normal;
            line-height: 1;
        }

        .archivist-note {
            font-size: 16px;
            line-height: 1.8;
            margin-top: auto;
            border-top: 1px solid rgba(139, 69, 19, 0.3);
            padding-top: 20px;
            color: #4a3728;
        }

        .watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-30deg);
            font-size: 120px;
            opacity: 0.04;
            pointer-events: none;
            font-family: 'Cinzel', serif;
            font-weight: 900;
        }

        .page-counter {
            display: none;
        }

        .report-footer {
            margin-top: auto;
            text-align: center;
            opacity: 0.5;
            font-size: 11px;
            letter-spacing: 1px;
            padding-bottom: 5px;
            font-family: 'Cinzel', serif;
        }

        @media print {
            @page {
                size: A4;
                margin: 0;
            }

            body {
                background: white !important;
                margin: 0;
                padding: 0;
                height: auto;
                overflow: visible;
            }

            #terminal,
            #game-overlay,
            #bg-letters-container {
                display: none !important;
            }

            #print-report {
                display: block !important;
                background: #f4e1c1 !important;
            }

            .report-page {
                margin: 0;
                box-shadow: none;
                page-break-after: always;
                border: 20px solid #f4e1c1 !important;
                background-color: #f4e1c1 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                height: 297mm;
                overflow: hidden;
            }

            .report-page:last-child {
                page-break-after: auto;
            }

            .no-print {
                display: none !important;
            }
        }
    </style>
</head>

<body>

    <div id="game-overlay">
        <div class="victory-text">THE CURSE IS BROKEN</div>
        <div class="line victory-subtext">YOUR LINEAGE IS FINALLY FREE</div>

        <div class="action-container">
            <button id="final-print-btn" class="print-btn no-print">Print Analysis</button>
        </div>

        <div class="line victory-prompt"><span id="interaction-prompt">PRESS ENTER</span> TO RETURN
            TO THE TOMB
        </div>
    </div>

    <!-- Hidden print-only report container -->
    <div id="print-report"></div>
    <div id="bg-letters-container"></div>
    <div id="terminal"></div>

    <script>
        const terminal = document.getElementById('terminal');
        const bgContainer = document.getElementById('bg-letters-container');
        const printBtn = document.getElementById('final-print-btn');
        const printReport = document.getElementById('print-report');
        const delay = 40; // Speed of typing in ms per character

        // Global storage for the final analysis
        let currentAnalysis = {
            name: "",
            letters: "",
            weights: "",
            shifted: "",
            vibration: "",
            seal: ""
        };

        // Device-specific interaction prompt
        const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        const clickText = isTouch ? "Tap" : "Press Enter";
        const interactionInstruction = isTouch ? "TAP SCREEN" : "PRESS ENTER";

        // Update any static prompts on load
        window.addEventListener('DOMContentLoaded', () => {
            const staticPrompt = document.getElementById('interaction-prompt');
            if (staticPrompt) {
                staticPrompt.textContent = interactionInstruction;
            }
        });

        function spawnLetter(char) {
            if (!char || char === ' ') return;
            const letter = document.createElement('div');
            letter.className = 'bg-letter';
            letter.textContent = char.toUpperCase();

            // Random position
            const x = Math.random() * 100;
            const y = Math.random() * 100;

            letter.style.left = x + '%';
            letter.style.top = y + '%';

            const rotate = (Math.random() - 0.5) * 60;
            letter.style.transform += ` rotate(${rotate}deg)`;

            bgContainer.appendChild(letter);
            setTimeout(() => letter.remove(), 3000);
        }

        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        function clearScreen() {
            terminal.innerHTML = "";
        }

        async function typeLine(text, isHTML = false, addWait = 0) {
            const lineDiv = document.createElement('div');
            lineDiv.className = 'line';
            terminal.appendChild(lineDiv);

            if (isHTML) {
                lineDiv.innerHTML = text;
                return lineDiv;
            }

            let currentText = "";
            for (let i = 0; i < text.length; i++) {
                currentText += text.charAt(i);
                lineDiv.innerHTML = currentText + '<span class="cursor"></span>';
                spawnLetter(text.charAt(i));
                await sleep(delay);
            }
            lineDiv.innerHTML = currentText;
            if (addWait > 0) await sleep(addWait);
            return lineDiv;
        }

        async function promptInput(promptText) {
            const wrapper = document.createElement('div');
            wrapper.className = "input-line-wrapper";
            const label = document.createElement('span');
            wrapper.appendChild(label);
            terminal.appendChild(wrapper);

            let currentText = "";
            for (let i = 0; i < promptText.length; i++) {
                currentText += promptText.charAt(i);
                label.textContent = currentText;
                await sleep(delay);
            }

            const inputSpan = document.createElement('span');
            inputSpan.contentEditable = "true";
            inputSpan.style.outline = "none";
            inputSpan.style.minWidth = "2vw";
            inputSpan.style.display = "inline-block";
            wrapper.appendChild(inputSpan);

            const cSpan = document.createElement('span');
            cSpan.className = 'cursor';
            wrapper.appendChild(cSpan);

            inputSpan.focus();
            document.addEventListener('click', () => inputSpan.focus());

            return new Promise(resolve => {
                inputSpan.addEventListener('input', function (e) {
                    const text = inputSpan.innerText;
                    if (text.length > 0) spawnLetter(text.charAt(text.length - 1));
                    const cleanText = text.replace(/[^A-Za-z ]/g, '');
                    if (text !== cleanText) {
                        inputSpan.innerText = cleanText;
                        const range = document.createRange();
                        const sel = window.getSelection();
                        range.selectNodeContents(inputSpan);
                        range.collapse(false);
                        sel.removeAllRanges();
                        sel.addRange(range);
                    }
                });

                inputSpan.addEventListener('keydown', function (e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        const val = inputSpan.innerText;
                        inputSpan.contentEditable = "false";
                        cSpan.remove();
                        resolve(val.trim());
                    }
                });
            });
        }

        // Handle full screen "Slide" / Section transitions
        async function playStep(linesCallback, options = {}) {
            clearScreen();

            if (options.dense) terminal.classList.add('dense');
            else terminal.classList.remove('dense');

            if (options.hiero) terminal.classList.add('hieroglyph-line');
            else terminal.classList.remove('hieroglyph-line');

            if (options.center) terminal.classList.add('center-stage');
            else terminal.classList.remove('center-stage');

            await linesCallback();

            if (options.waitForEnter !== false) {
                // Drop a blinking cursor indicating readiness for the next step 
                const cLine = document.createElement('div');
                cLine.className = 'line';
                cLine.innerHTML = `<span style="font-size: 0.5em; opacity: 0.5;">[Unlock the Seal - ${clickText}] </span><span class="cursor"></span>`;
                terminal.appendChild(cLine);

                return new Promise(resolve => {
                    const proceed = () => {
                        document.removeEventListener('keydown', keyHandler);
                        document.removeEventListener('click', clickHandler);
                        resolve();
                    };
                    const keyHandler = (e) => { if (e.key === 'Enter') proceed(); };
                    const clickHandler = () => proceed();

                    document.addEventListener('keydown', keyHandler);
                    document.addEventListener('click', clickHandler);
                });
            }
        }

        async function generateOutput(name) {
            const lettersOnly = name.toUpperCase().replace(/[^A-Z]/g, '');
            if (!lettersOnly) {
                await playStep(async () => {
                    await typeLine("Error: No valid alphabetical letters found in the name.");
                    await typeLine("Please try again.");
                }, { waitForEnter: true });

                runProgram(); // Restart the experience
                return;
            }

            let origNumbers = [];
            for (let i = 0; i < lettersOnly.length; i++) {
                origNumbers.push(lettersOnly.charCodeAt(i) - 64);
            }

            let encNumbers = [];
            let encLetters = [];
            let encLettersJoined = "";
            let hieroglyphs = "";

            for (let i = 0; i < origNumbers.length; i++) {
                let x = origNumbers[i];
                let res = ((3 * x) + 2) % 26;
                if (res === 0) res = 26;
                encNumbers.push(res);
                let encChar = String.fromCharCode(64 + res);
                encLetters.push(encChar);
                encLettersJoined += encChar;
            }

            // Store for analysis
            currentAnalysis = {
                name: name,
                letters: lettersOnly.split("").join(", "),
                weights: origNumbers.join(", "),
                shifted: encNumbers.join(", "),
                vibration: encLetters.join(", "),
                seal: ""
            };

            // STEP 3
            await playStep(async () => {
                await typeLine(`The Ancestor ${name} has been identified.`, false, 500);
                await typeLine("The Curse will be dissolved through the Ritual of Transmutation.", false, 500);
                await typeLine("By the law of f(x) = 3x + 2 mod 26, the spirit manifests.");
            }, { dense: true });

            // STEP 4
            await playStep(async () => {
                await typeLine(" [SEAL 1: ALPHABETIC RECALL]", false, 400);
                await typeLine(`Sacred Name: ${name}`, false, 400);
                await typeLine(`Vibrational Letters: ${lettersOnly.split("").join(", ")}`);
            });

            // STEP 5
            await playStep(async () => {
                await typeLine(" [SEAL 2: NUMERICAL WEIGHT]", false, 400);
                await typeLine("Each glyph carries a mortal weight (A=1...Z=26)", false, 400);
                await typeLine(`Weight values: ${origNumbers.join(", ")}`);
            });

            // STEP 6
            await playStep(async () => {
                await typeLine(" [SEAL 3: THE ALCHEMIST'S KEY]", false, 400);
                await typeLine("To shift the fate, multiply the weight by 3 and add 2.", false, 400);
                await typeLine("f(x) = 3x + 2 mod 26");
            });

            // STEP 7
            await playStep(async () => {
                await typeLine(" [SEAL 4: THE NEW DESTINY]", false, 400);
                await typeLine(`Transmuted numbers: ${encNumbers.join(", ")}`);
            });

            // STEP 8
            await playStep(async () => {
                await typeLine(" [SEAL 5: PHONETIC SHIFT]", false, 400);
                await typeLine(`New vibration: ${encLetters.join(", ")}`);
            });

            const hieroglyphMap = {
                'A': '𓄿', 'B': '𓃀', 'C': '𓍿', 'D': '𓂧', 'E': '𓇋',
                'F': '𓆑', 'G': '𓎼', 'H': '𓉔', 'I': '𓇋', 'J': '𓆓',
                'K': '𓎡', 'L': '𓃭', 'M': '𓅓', 'N': '𓈖', 'O': '𓂝',
                'P': '𓊪', 'Q': '𓈎', 'R': '𓂋', 'S': '𓋴', 'T': '𓏏',
                'U': '𓅱', 'V': '𓆑', 'W': '𓅱', 'X': '𓐍', 'Y': '𓇋',
                'Z': '𓊃'
            };

            // STEP 9
            await playStep(async () => {
                await typeLine(" [FINAL SEAL: HIEROGLYPHIC MANIFESTATION]", false, 400);
                for (let i = 0; i < encLetters.length; i++) {
                    let letter = encLetters[i];
                    let symbol = hieroglyphMap[letter];
                    hieroglyphs += symbol;
                    await typeLine(`${letter} -> <span class="hieroglyph">${symbol}</span>`, true);
                    await sleep(300);
                }
                await typeLine(`Final Holy Seal:`, false, 300);
                await typeLine(`<span class="hieroglyph">${hieroglyphs}</span>`, true);
                currentAnalysis.seal = hieroglyphs;
            }, { hiero: true });

            // STEP 10
            await playStep(async () => {
                await typeLine(" [THE RITUAL IS COMPLETE]", false, 400);
                await typeLine(`Ancestor: ${name}`);
                await typeLine(`Sacred Seal: <span class="hieroglyph">${hieroglyphs}</span>`, true);
                await sleep(1000);
                await typeLine("THE CURSE IS WEAKENING...");
                await sleep(1500);
            }, { dense: true, waitForEnter: true });

            // Victory Screen
            const overlay = document.getElementById('game-overlay');
            overlay.classList.add('active');

            // Hook up print button
            printBtn.onclick = (e) => {
                e.stopPropagation(); // Don't close overlay

                const lArr = currentAnalysis.letters.split(", ");
                const wArr = currentAnalysis.weights.split(", ");
                const sArr = currentAnalysis.shifted.split(", ");
                const vArr = currentAnalysis.vibration.split(", ");
                const gArr = Array.from(currentAnalysis.seal);

                let rowsHtml = "";
                for (let i = 0; i < lArr.length; i++) {
                    rowsHtml += `
                        <tr>
                            <td>${lArr[i]}</td>
                            <td>${wArr[i]}</td>
                            <td>${sArr[i]}</td>
                            <td style="font-size: 24px;">${gArr[i] || ""}</td>
                        </tr>
                    `;
                }

                const dateStr = new Date().toLocaleDateString();
                const timeStr = new Date().toLocaleTimeString();

                // Determine if we need dense mode based on result length (>7 characters)
                const isDense = lArr.length > 7;

                // Construct and trigger report with a single defined page
                printReport.innerHTML = `
                    <!-- SINGLE PAGE ARCHIVE -->
                    <div class="report-page ${isDense ? 'dense-data' : ''}">
                        <div class="watermark"></div>
                        <div class="report-header">
                            <h1>The Pharaonic Archive</h1>
                            <p>Sacred Transmutation Record</p>
                            <p>${dateStr} | ${timeStr}</p>
                        </div>

                        <div class="summary-section">
                            <p>By the law of <strong>f(x) = 3x + 2 (mod 26)</strong>, the spirit of <strong>${currentAnalysis.name}</strong> has passed the halls of justice and the spirit has been aligned with the eternal stones. The following vibrations were recorded:</p>
                        </div>

                        <table class="report-table">
                            <thead>
                                <tr>
                                    <th>Glyph</th>
                                    <th>Weight</th>
                                    <th>f(x)</th>
                                    <th>Symbol</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${rowsHtml}
                            </tbody>
                        </table>
                        
                        <div class="cartouche-container">
                            <div class="cartouche">
                                <div class="cartouche-name" style="font-size: 40px; letter-spacing: 2px;">${currentAnalysis.seal}</div>
                            </div>
                            <p style="font-size: 10px; margin-top: 10px; opacity: 0.6; letter-spacing: 2px;">Your Secret Pharaoh Identity</p>
                        </div>

                        <div class="report-seal-box">
                            <span style="font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: #8b4513;">Final Holy Seal</span>
                            <div class="report-hieros" style="font-size: 40px;">${currentAnalysis.seal}</div>
                        </div>

                        <div class="archivist-note">
                            <p>The subject's lineage is now decoupled from the shadow currency and aligned with the eternal stones. No further sacrifices are required.</p>
                        </div>

                        <div class="report-footer">Designed By Adham Eldeeb</div>
                    </div>
                `;
                window.print();
            };

            return new Promise(resolve => {
                const proceed = (e) => {
                    // Ignore if clicking the print button
                    if (e.target && e.target.id === 'final-print-btn') return;

                    document.removeEventListener('keydown', keyHandler);
                    document.removeEventListener('click', clickHandler);
                    overlay.classList.remove('active');
                    resolve();
                    runProgram();
                };
                const keyHandler = (e) => { if (e.key === 'Enter') proceed(e); };
                const clickHandler = (e) => proceed(e);

                document.addEventListener('keydown', keyHandler);
                document.addEventListener('click', clickHandler);
            });
        }

        async function runProgram() {
            // PROLOGUE
            await playStep(async () => {
                await typeLine("You open your eyes. The air is heavy with the scent of ancient dust.", false, 1000);
                await typeLine("Cold stone walls rise around you, etched with stories of a forgotten age.", false, 1000);
                await typeLine("A voice whispers from the dark... 'Only the sacred ritual can free you.'", false, 1200);
                await typeLine(`${clickText} to approach the pedestal...`);
            }, { dense: true });

            // STEP 1
            await playStep(async () => {
                await typeLine(" [THE CHAMBER OF THE ANCIENTS]", false, 500);
                await typeLine("A curse has been cast upon your lineage.", false, 500);
                await typeLine("You must break the five seals to survive.", false, 800);
                await typeLine(`${clickText} to begin the ritual...`);
            }, { center: true });

            // STEP 2
            clearScreen();
            terminal.classList.remove('dense', 'hieroglyph-line', 'center-stage');
            const parentName = await promptInput("Identify the target name to save: ");
            await sleep(500);

            await generateOutput(parentName);
        }

        // Initialize exactly on load
        window.onload = runProgram;
    </script>
</body>

</html>
